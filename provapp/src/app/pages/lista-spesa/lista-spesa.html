<h1>Lista della spesa</h1>
<form (ngSubmit)="addItem()">
<input
[value]="newItem()"
(input)="newItem.set($any($event.target).value)"
placeholder="Es. Latte, Pane..."
required
/>
<button type="submit">Aggiungi</button>
</form>
@if (error()) {
<p>{{ error() }}</p>
}
@if (items().length === 0) {
<p>Nessun elemento nella lista.</p>
} 
@else {
<ul>
  @for (obj of items(); track obj.id) {
    <li style="margin-bottom: 8px;">
      {{ obj.item }}
      <button (click)="deleteItem(obj.id)" style="margin-left: 15px; color: white; background: red; border: none; border-radius: 4px; cursor: pointer;">
        Elimina
      </button>
    </li>
  }
</ul>
